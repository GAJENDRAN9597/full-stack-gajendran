<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        .container{
            display: block;
            background-color: aqua;

        }
        .inline{

            background-color: coral;
            width: 200px;
        }
        .inlineblock{
            display:inline-block;
            background-color: brown;
            width: 200px;
        }
        span{

            width: 200px;
        }
        .navbar{
            background-color: beige;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }
        .list{
            list-style:none;

        }
        .link{
            text-decoration: none;
            color: black;
            padding: 10px;
            background-color: brown;
            border-radius: 10px;
        }
        .link:hover{
            background-color: crimson;
            color: darkgrey;
        }
    </style>
</head>
<body>
    <nav>

</html>
